services:
  backend:
    build:
      context: .
      dockerfile: ./Dict/Dockerfile
    ports:
      - "5008:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - CorsOrigins=https://dict-six-kappa.vercel.app
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-vision-key.json
    volumes:
      - ../gcp-vision-key.json:/app/gcp-vision-key.json:ro
    restart: unless-stopped